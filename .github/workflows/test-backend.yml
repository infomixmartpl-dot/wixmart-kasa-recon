name: Backend lint + smoke

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/test-backend.yml']
  pull_request:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff lint (non-blocking)
        working-directory: backend
        run: ruff check . || true

      - name: Smoke import (FastAPI app loads, all routes resolve)
        working-directory: backend
        run: |
          python -c "from recon_backend.main import app; print('routes:', len([r for r in app.routes if hasattr(r, 'methods')]))"
